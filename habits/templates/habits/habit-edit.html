<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать привычку</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="mb-4">Редактировать привычку</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="name" value="{{ habit.name }}" class="form-control" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
                <div class="mb-3">
                    <label class="form-label">Частота</label>
                    <select name="frequency_type" class="form-select">
                        <option value="daily" {% if habit.frequency_type == 'daily' %}selected{% endif %}>Каждый день
                        </option>
                        <option value="every_n_days" {% if habit.frequency_type == 'every_n_days' %}selected{% endif %}>
                            Каждые N дней
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">N</label>
                    <input type="number" name="frequency_value" value="{{ habit.frequency_value }}" min="1"
                           class="form-control" style="width:70px">
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
